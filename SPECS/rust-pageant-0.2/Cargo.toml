[package]
edition = "2024"
rust-version = "1.85"
name = "pageant"
version = "0.2.1"
authors = ["Eugene <inbox@null.page>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Pageant SSH agent transport client."
documentation = "https://docs.rs/pageant"
readme = false
license = "Apache-2.0"
repository = "https://github.com/warp-tech/russh"
resolver = "2"

[features]
default = [
    "wmmessage",
    "namedpipes",
]
namedpipes = [
    "tokio/net",
    "tokio/time",
    "dep:sha2",
    "dep:windows-strings",
    "windows/Win32_Security_Authentication_Identity",
    "windows/Win32_Security_Cryptography",
]
wmmessage = [
    "tokio/rt",
    "tokio/io-util",
    "windows/Win32_UI_WindowsAndMessaging",
    "windows/Win32_System_Memory",
    "windows/Win32_System_Threading",
    "windows/Win32_System_DataExchange",
]

[lib]
name = "pageant"
path = "src/lib.rs"

[dependencies.thiserror]
version = "2.0.18"

[target."cfg(windows)".dependencies.base16ct]
version = "1"
features = ["alloc"]

[target."cfg(windows)".dependencies.byteorder]
version = "1.4"

[target."cfg(windows)".dependencies.bytes]
version = "1.7"

[target."cfg(windows)".dependencies.delegate]
version = "0.13"

[target."cfg(windows)".dependencies.futures]
version = "0.3"

[target."cfg(windows)".dependencies.log]
version = "0.4.11"

[target."cfg(windows)".dependencies.rand]
version = "0.10"
features = ["thread_rng"]

[target."cfg(windows)".dependencies.sha2]
version = "0.11"
features = ["oid"]
optional = true

[target."cfg(windows)".dependencies.tokio]
version = "1.17.0"

[target."cfg(windows)".dependencies.windows]
version = "0.62"
features = ["Win32_Security"]

[target."cfg(windows)".dependencies.windows-strings]
version = "0.5"
optional = true
